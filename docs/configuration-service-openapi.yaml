openapi: 3.1.0
info:
  title: Configuration Service
  version: 1.0.0
  description: |
    Device/PV registry for Bluesky Remote Architecture (SVC-004).
    Plans are managed by Experiment Execution Service.

    This service provides:
    - Device registry with metadata and PV mappings
    - Device instantiation specifications for remote device creation
    - Runtime device management (create, update, delete) with persistent change history
    - Standalone PV registration for beamline PVs not wrapped in ophyd devices
    - PV discovery and metadata

servers:
  - url: /

paths:
  # =============================================================================
  # Health & Readiness
  # =============================================================================
  /health:
    get:
      operationId: health_check
      summary: Health Check
      description: Health check endpoint.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  /ready:
    get:
      operationId: readiness_check
      summary: Readiness Check
      description: Readiness check endpoint.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: string

  # =============================================================================
  # Devices
  # =============================================================================
  /api/v1/devices:
    get:
      operationId: list_devices
      summary: List Devices
      description: Query available devices from registry
      parameters:
        - name: device_label
          in: query
          description: Filter by device type
          required: false
          schema:
            $ref: "#/components/schemas/DeviceLabel"
        - name: pattern
          in: query
          description: Glob pattern for name matching
          required: false
          schema:
            type: string
            nullable: true
        - name: ophyd_class
          in: query
          description: Filter by ophyd device class name (e.g., EpicsMotor, EpicsScaler)
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

    post:
      operationId: create_device
      summary: Create Runtime Device
      description: |
        Add a new device to the registry at runtime.

        Adds the device to the in-memory registry and records the change
        to SQLite.
      tags:
        - Device Management
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceCreateRequest"
      responses:
        "201":
          description: Device created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCRUDResponse"
        "400":
          description: Name mismatch between metadata and instantiation spec
        "409":
          description: Device already exists with this name
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/devices-info:
    get:
      operationId: get_all_devices_info
      summary: Get All Devices Info
      description: Get detailed metadata for all devices (ophyd-websocket compatible)
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/DeviceMetadata"

  /api/v1/devices/classes:
    get:
      operationId: list_device_classes
      summary: List Device Classes
      description: Get list of unique ophyd device classes (as-ophyd-api compatible)
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v1/devices/types:
    get:
      operationId: list_device_labels
      summary: List Device Types
      description: Get list of device type categories
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /api/v1/devices/instantiation:
    get:
      operationId: list_device_instantiation_specs
      summary: List Device Instantiation Specs
      description: Get all device instantiation specifications for remote device creation
      parameters:
        - name: active_only
          in: query
          description: Only return active devices
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/DeviceInstantiationSpec"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/devices/history:
    get:
      operationId: list_device_history
      summary: List Device Change History
      description: |
        List all runtime device changes for audit/inspection.

        Returns information about devices that have been added, updated,
        or deleted at runtime. Useful for auditing what has changed
        versus the base profile.
      tags:
        - Device Management
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceChangeRecord"
        "501":
          description: Device change history not enabled

  /api/v1/devices/{device_name}/enable:
    patch:
      operationId: enable_device
      summary: Enable Device
      description: |
        Enable a device so it will be instantiated by remote services.

        Sets the device's instantiation spec `active` flag to True.
        Idempotent: enabling an already-enabled device returns success.
      tags:
        - Device Management
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device enabled (or already enabled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCRUDResponse"
        "404":
          description: Device or instantiation spec not found

  /api/v1/devices/{device_name}/disable:
    patch:
      operationId: disable_device
      summary: Disable Device
      description: |
        Disable a device so it will not be instantiated by remote services.

        Sets the device's instantiation spec `active` flag to False.
        Disabled devices remain in the registry but are excluded from
        active-only spec listings. Idempotent.
      tags:
        - Device Management
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device disabled (or already disabled)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCRUDResponse"
        "404":
          description: Device or instantiation spec not found

  /api/v1/devices/{device_name}:
    get:
      operationId: get_device_metadata
      summary: Get Device Metadata
      description: Get detailed metadata for specific device including PV mappings
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceMetadata"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

    put:
      operationId: update_device
      summary: Update Device
      description: |
        Update an existing device's metadata and/or instantiation spec.

        Merges provided fields with existing device data. Omitted fields
        keep their current values. Tracks original source when modifying
        profile-loaded devices.
      tags:
        - Device Management
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdateRequest"
      responses:
        "200":
          description: Device updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCRUDResponse"
        "400":
          description: Name in body does not match path parameter
        "404":
          description: Device not found
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

    delete:
      operationId: delete_device
      summary: Delete Device
      description: |
        Remove a device from the registry.

        For profile-loaded devices, saves a 'delete' marker so the device
        stays hidden across restarts. For runtime-added devices, the
        change record is hard-deleted.
      tags:
        - Device Management
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Device deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCRUDResponse"
        "404":
          description: Device not found
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/devices/{device_name}/instantiation:
    get:
      operationId: get_device_instantiation_spec
      summary: Get Device Instantiation Spec
      description: Get instantiation specification for a specific device
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInstantiationSpec"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/devices/{device_name}/components:
    get:
      operationId: list_device_components
      summary: List Device Components
      description: |
        List all components of a device. Use max_depth to limit
        traversal into nested sub-components.
      parameters:
        - name: device_name
          in: path
          required: true
          schema:
            type: string
        - name: max_depth
          in: query
          description: Maximum component depth (0 = all, 1 = top-level only)
          required: false
          schema:
            type: integer
            minimum: 0
            nullable: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object

  /api/v1/devices/{device_path}/component:
    get:
      operationId: get_nested_device_component
      summary: Get Nested Device Component
      description: Look up nested device component by dot-separated path
      parameters:
        - name: device_path
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NestedDeviceComponent"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  # =============================================================================
  # PVs
  # =============================================================================
  /api/v1/pvs:
    get:
      operationId: list_pvs
      summary: List PVs
      description: Query available PVs from loaded devices and standalone registrations
      parameters:
        - name: pattern
          in: query
          description: Glob pattern for PV name matching
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

    post:
      operationId: create_standalone_pv
      summary: Register Standalone PV
      description: |
        Register a standalone PV not associated with any ophyd device.

        Adds the PV to the in-memory registry and persists it to SQLite.
        Returns 409 if the PV name already exists (device-bound or standalone).
      tags:
        - Standalone PVs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandalonePVCreateRequest"
      responses:
        "201":
          description: Standalone PV registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandalonePVCRUDResponse"
        "409":
          description: PV already exists (device-bound or duplicate standalone)
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/pvs/standalone:
    get:
      operationId: list_standalone_pvs
      summary: List Standalone PVs
      description: |
        List all registered standalone PVs with optional label filtering.

        Optional labels query parameter filters to PVs having ALL specified labels.
      tags:
        - Standalone PVs
      parameters:
        - name: labels
          in: query
          description: Comma-separated labels to filter by (AND logic)
          required: false
          schema:
            type: string
            nullable: true
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StandalonePV"
        "501":
          description: Standalone PV registration not enabled

  /api/v1/pvs/labels:
    get:
      operationId: list_standalone_pv_labels
      summary: List Standalone PV Labels
      description: Get all unique labels across registered standalone PVs
      tags:
        - Standalone PVs
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
        "501":
          description: Standalone PV registration not enabled

  /api/v1/pvs/standalone/{pv_name}:
    put:
      operationId: update_standalone_pv
      summary: Update Standalone PV
      description: |
        Update a registered standalone PV.

        Merges provided fields with existing values. Returns 404 if not found.
      tags:
        - Standalone PVs
      parameters:
        - name: pv_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StandalonePVUpdateRequest"
      responses:
        "200":
          description: Standalone PV updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandalonePVCRUDResponse"
        "404":
          description: Standalone PV not found
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

    delete:
      operationId: delete_standalone_pv
      summary: Delete Standalone PV
      description: |
        Remove a registered standalone PV.

        Removes from both the persistent store and the in-memory registry.
        Returns 404 if not found.
      tags:
        - Standalone PVs
      parameters:
        - name: pv_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Standalone PV deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StandalonePVCRUDResponse"
        "404":
          description: Standalone PV not found
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

  /api/v1/pvs/detailed:
    get:
      operationId: get_detailed_pv_information
      summary: Get Detailed PV Information
      description: Get PVs organized by device with signal path information
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}

  /api/v1/pvs/{pv_name}:
    get:
      operationId: get_pv_metadata
      summary: Get PV Metadata
      description: Get detailed metadata for specific PV
      parameters:
        - name: pv_name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PVMetadata"
        "422":
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"

# =============================================================================
# Components
# =============================================================================
components:
  schemas:
    # -------------------------------------------------------------------------
    # Enums
    # -------------------------------------------------------------------------
    DeviceLabel:
      type: string
      description: |
        Device classification matching protocol specification.
      enum:
        - motor
        - detector
        - signal
        - flyer
        - readable
        - device

    # -------------------------------------------------------------------------
    # Device Schemas
    # -------------------------------------------------------------------------
    DeviceMetadata:
      type: object
      description: |
        Device metadata model.
        
        Represents device information loaded from profile collections.
        Maps to ProvidesDeviceRegistry.get_device() return type.
        
        Compatible with ophyd/ophyd-async device introspection.
      required:
        - name
        - device_label
        - ophyd_class
      properties:
        name:
          type: string
          description: Device name from profile collection
          example: sample_x
        device_label:
          $ref: "#/components/schemas/DeviceLabel"
        ophyd_class:
          type: string
          description: Ophyd device class name
          example: EpicsMotor
        module:
          type: string
          nullable: true
          description: Python module containing the device class
          example: ophyd.epics_motor
        is_movable:
          type: boolean
          default: false
          description: Implements Movable protocol
        is_flyable:
          type: boolean
          default: false
          description: Implements Flyable protocol
        is_readable:
          type: boolean
          default: false
          description: Implements Readable protocol
        is_triggerable:
          type: boolean
          default: false
          description: Implements Triggerable protocol (has trigger)
        is_stageable:
          type: boolean
          default: false
          description: Implements Stageable protocol (has stage/unstage)
        is_configurable:
          type: boolean
          default: false
          description: Implements Configurable protocol (has read_configuration/describe_configuration)
        is_pausable:
          type: boolean
          default: false
          description: Implements Pausable protocol (has pause/resume)
        is_stoppable:
          type: boolean
          default: false
          description: Implements Stoppable protocol (has stop)
        is_subscribable:
          type: boolean
          default: false
          description: Implements Subscribable protocol (has subscribe/clear_sub)
        is_checkable:
          type: boolean
          default: false
          description: Implements Checkable protocol (has check_value)
        writes_external_assets:
          type: boolean
          default: false
          description: Writes external assets (has collect_asset_docs)
        pvs:
          type: object
          additionalProperties:
            type: string
          description: Component name to PV mapping
          example:
            user_readback: BL01:SAMPLE:X.RBV
            user_setpoint: BL01:SAMPLE:X
            velocity: BL01:SAMPLE:X.VELO
        hints:
          type: object
          nullable: true
          description: Bluesky hints for plotting/display
          properties:
            fields:
              type: array
              items:
                type: string
          example:
            fields:
              - sample_x
        read_attrs:
          type: array
          items:
            type: string
          description: Readable attributes
          example:
            - user_readback
            - user_setpoint
        configuration_attrs:
          type: array
          items:
            type: string
          description: Configuration attributes
          example:
            - velocity
            - acceleration
        parent:
          type: string
          nullable: true
          description: Parent device if this is a component
        labels:
          type: array
          items:
            type: string
          description: Device labels for grouping (e.g., 'motors', 'detectors', 'baseline')
        beamline:
          type: string
          nullable: true
          description: Beamline identifier (from happi)
        location_group:
          type: string
          nullable: true
          description: Location grouping (from happi)
        functional_group:
          type: string
          nullable: true
          description: Functional grouping (from happi)
        documentation:
          type: string
          nullable: true
          description: Device documentation/description

    DeviceInstantiationSpec:
      type: object
      description: |
        Device instantiation specification for remote device creation.
        
        This model contains all information needed to recreate a device instance 
        in another service (e.g., Experiment Execution Service). By providing the 
        class path and constructor arguments, remote services can
        dynamically import and instantiate identical device objects.
        
        This enables Configuration Service to be the single source of truth for 
        device definitions, ensuring PV names and configurations are consistent 
        across all services.
      required:
        - name
        - device_class
      properties:
        name:
          type: string
          description: Device name from profile collection
          example: det1
        device_class:
          type: string
          description: |
            Fully qualified class path
            (e.g., 'ophyd.EpicsMotor', 'ophyd.EpicsScaler')
          example: ophyd.EpicsScaler
        args:
          type: array
          items: {}
          description: Positional arguments for device constructor (e.g., ['BL01:DET1:'])
          example:
            - "BL01:DET1:"
        kwargs:
          type: object
          additionalProperties: {}
          description: "Keyword arguments for device constructor (e.g., {'name': 'det1'})"
          example:
            name: det1
        active:
          type: boolean
          default: true
          description: Whether this device should be instantiated

    NestedDeviceComponent:
      type: object
      description: Information about a nested device component.
      properties:
        name:
          type: string
          description: Component name
        device_path:
          type: string
          description: Full path to component
        parent_device:
          type: string
          description: Parent device name
        component_type:
          type: string
          nullable: true
          description: Component type
        pv:
          type: string
          nullable: true
          description: Associated EPICS PV
        is_readable:
          type: boolean
          default: true
          description: Whether component is readable
        is_settable:
          type: boolean
          default: false
          description: Whether component is settable

    # -------------------------------------------------------------------------
    # Device CRUD Schemas
    # -------------------------------------------------------------------------
    DeviceCreateRequest:
      type: object
      description: |
        Request model for creating a runtime device.

        Both metadata and instantiation_spec are required. The name field
        in metadata must match the name field in instantiation_spec.
      required:
        - metadata
        - instantiation_spec
      properties:
        metadata:
          $ref: "#/components/schemas/DeviceMetadata"
        instantiation_spec:
          $ref: "#/components/schemas/DeviceInstantiationSpec"
      example:
        metadata:
          name: new_motor
          device_label: motor
          ophyd_class: EpicsMotor
          is_movable: true
          is_readable: true
          pvs:
            user_readback: "NEW:MOTOR.RBV"
            user_setpoint: "NEW:MOTOR"
        instantiation_spec:
          name: new_motor
          device_class: ophyd.EpicsMotor
          args:
            - "NEW:MOTOR"
          kwargs:
            name: new_motor
          active: true

    DeviceUpdateRequest:
      type: object
      description: |
        Request model for updating a device.

        Both fields are optional for partial updates. If metadata is provided,
        its name must match the path parameter. If instantiation_spec is provided,
        its name must also match. Omitted fields keep their current values.
      properties:
        metadata:
          $ref: "#/components/schemas/DeviceMetadata"
        instantiation_spec:
          $ref: "#/components/schemas/DeviceInstantiationSpec"

    DeviceCRUDResponse:
      type: object
      description: Response model for device CRUD operations.
      required:
        - success
        - device_name
        - operation
        - message
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        device_name:
          type: string
          description: Name of the device
        operation:
          type: string
          description: Operation performed (create/update/delete/enable/disable)
          enum:
            - create
            - update
            - delete
            - enable
            - disable
        message:
          type: string
          description: Human-readable status message
      example:
        success: true
        device_name: new_motor
        operation: create
        message: "Device 'new_motor' created successfully"

    DeviceChangeRecord:
      type: object
      description: |
        Record of a runtime device change.

        Represents a device that has been added, updated, or deleted
        at runtime versus the base profile configuration.
      required:
        - name
        - operation
        - source
      properties:
        name:
          type: string
          description: Device name
          example: my_motor
        operation:
          type: string
          description: Change operation type
          enum:
            - add
            - update
            - delete
          example: add
        source:
          type: string
          description: Source of change
          example: runtime
        original_source:
          type: string
          nullable: true
          description: Original source if overriding a profile device
          example: profile
        created_by:
          type: string
          nullable: true
          description: User who made the change
          example: staff@facility.org
        created_at:
          type: number
          format: double
          nullable: true
          description: Unix timestamp of creation
          example: 1705312200.0
        updated_at:
          type: number
          format: double
          nullable: true
          description: Unix timestamp of last update
          example: 1705312200.0

    # -------------------------------------------------------------------------
    # Standalone PV Schemas
    # -------------------------------------------------------------------------
    PVProtocol:
      type: string
      description: EPICS protocol for standalone PV access.
      enum:
        - ca
        - pva

    PVAccessMode:
      type: string
      description: Access mode for standalone PVs.
      enum:
        - read-only
        - read-write

    StandalonePV:
      type: object
      description: |
        A standalone PV not associated with any ophyd device.

        Standalone PVs represent beamline PVs (shutters, vacuum gauges,
        ring current, diagnostics) that are not wrapped in ophyd device objects.
      required:
        - pv_name
      properties:
        pv_name:
          type: string
          description: EPICS PV name
          example: "SR:C01:RING:CURR"
        description:
          type: string
          nullable: true
          description: Human-readable description
          example: Storage ring current
        protocol:
          $ref: "#/components/schemas/PVProtocol"
        access_mode:
          $ref: "#/components/schemas/PVAccessMode"
        labels:
          type: array
          items:
            type: string
          description: Labels for grouping and filtering
          example:
            - diagnostics
            - ring
        source:
          type: string
          description: Source of registration
          example: runtime
        created_by:
          type: string
          nullable: true
          description: User who registered this PV
          example: staff@facility.org
        created_at:
          type: number
          format: double
          nullable: true
          description: Unix timestamp of creation
        updated_at:
          type: number
          format: double
          nullable: true
          description: Unix timestamp of last update

    StandalonePVCreateRequest:
      type: object
      description: Request model for registering a standalone PV.
      required:
        - pv_name
      properties:
        pv_name:
          type: string
          description: EPICS PV name
          example: "SR:C01:RING:CURR"
        description:
          type: string
          nullable: true
          description: Human-readable description
        protocol:
          $ref: "#/components/schemas/PVProtocol"
        access_mode:
          $ref: "#/components/schemas/PVAccessMode"
        labels:
          type: array
          items:
            type: string
          description: Labels for grouping and filtering
      example:
        pv_name: "SR:C01:RING:CURR"
        description: Storage ring current
        protocol: ca
        access_mode: read-only
        labels:
          - diagnostics
          - ring

    StandalonePVUpdateRequest:
      type: object
      description: |
        Request model for updating a standalone PV.
        All fields are optional for partial updates.
      properties:
        description:
          type: string
          nullable: true
          description: Human-readable description
        protocol:
          $ref: "#/components/schemas/PVProtocol"
        access_mode:
          $ref: "#/components/schemas/PVAccessMode"
        labels:
          type: array
          items:
            type: string
          description: Labels for grouping and filtering

    StandalonePVCRUDResponse:
      type: object
      description: Response model for standalone PV CRUD operations.
      required:
        - success
        - pv_name
        - operation
        - message
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
        pv_name:
          type: string
          description: PV name
        operation:
          type: string
          description: Operation performed
          enum:
            - create
            - update
            - delete
        message:
          type: string
          description: Human-readable status message
      example:
        success: true
        pv_name: "SR:C01:RING:CURR"
        operation: create
        message: "Standalone PV 'SR:C01:RING:CURR' registered successfully"

    # -------------------------------------------------------------------------
    # PV Schemas
    # -------------------------------------------------------------------------
    PVMetadata:
      type: object
      description: |
        EPICS PV metadata model.
        
        Represents PV information from EPICS network discovery.
        Maps to ProvidesDeviceRegistry.get_pv_metadata() return type.
      required:
        - pv
      properties:
        pv:
          type: string
          description: EPICS PV name
          example: BL01:SAMPLE:X.RBV
        connected:
          type: boolean
          default: false
          description: Connection status
        dtype:
          type: string
          nullable: true
          description: EPICS data type
          example: double
        units:
          type: string
          nullable: true
          description: Engineering units
          example: mm
        precision:
          type: integer
          nullable: true
          description: Display precision
          example: 3
        enum_strs:
          type: array
          nullable: true
          items:
            type: string
          description: Enumeration strings for enum PVs
        upper_ctrl_limit:
          type: number
          nullable: true
          description: Upper control limit
          example: 100
        lower_ctrl_limit:
          type: number
          nullable: true
          description: Lower control limit
          example: -100
        device_name:
          type: string
          nullable: true
          description: Owning device name if known
          example: sample_x
        component_name:
          type: string
          nullable: true
          description: Component name within device
          example: user_readback

    # -------------------------------------------------------------------------
    # Validation Errors
    # -------------------------------------------------------------------------
    ValidationError:
      type: object
      required:
        - loc
        - msg
        - type
      properties:
        loc:
          type: array
          items:
            oneOf:
              - type: string
              - type: integer
          description: Error location
        msg:
          type: string
          description: Error message
        type:
          type: string
          description: Error type

    HTTPValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            $ref: "#/components/schemas/ValidationError"
